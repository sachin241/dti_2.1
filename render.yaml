services:
  - type: web
    name: dti-price-tracker
    runtime: docker
    autoDeploy: true
    healthCheckPath: /health
    disk:
      name: dti-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: SESSION_HTTPS_ONLY
        value: "true"
      - key: ENABLE_SCHEDULER
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      # SMTP Configuration (cloud-compatible defaults)
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USE_SSL
        value: "false"
